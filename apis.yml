aid: diligent-robotics
name: Diligent Robotics
description: >-
  Diligent Robotics is an Austin, Texas-based healthcare robotics company
  founded in 2017 by Andrea Thomaz (CEO) and Vivian Chu (CIO), both trained
  as roboticists at MIT, Georgia Tech, and the University of Texas at Austin.
  The company builds Moxi, a socially intelligent mobile manipulator that
  operates autonomously inside hospitals to handle non-clinical material
  transport — delivering medications, lab samples, supplies, PPE, and
  patient items so nurses and clinical staff can focus on patient care.
  Moxi combines mobile manipulation (grasping, opening doors, riding
  elevators), social navigation, and human-guided learning, and is
  deployed 24/7 with minimal facility infrastructure (existing Wi-Fi).
  Operationally, Moxi has logged 500,000+ deliveries and 100,000+
  autonomous elevator rides across customer hospitals including UTMB,
  Shannon Health, ThedaCare, Carilion Giles Community Hospital, and
  Medical City Denton. The platform is HIPAA compliant, SOC 2 Type II
  audited, and TX-RAMP Level 2 certified. Diligent has raised roughly
  $100M across rounds led by Canaan, True Ventures, Tiger Global, DNX
  Ventures, Next Coast Ventures, and Northwestern Medicine Innovation.
  Diligent's revenue model is robot deployment/leasing and enterprise
  services; there is no public developer API, SDK, or open-source
  release for Moxi or its underlying robotics stack.
